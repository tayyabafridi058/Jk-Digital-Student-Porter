<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JK Digital Enrollment Form</title>
    <script>
      // Robust fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This intercepts assignments to window.fetch and allows them to succeed.
      (function() {
        try {
          var _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { _fetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not redefine fetch with setter', e);
        }

        // Also handle globalThis
        if (typeof globalThis !== 'undefined' && globalThis !== window) {
          try {
            var _gFetch = globalThis.fetch;
            Object.defineProperty(globalThis, 'fetch', {
              get: function() { return _gFetch; },
              set: function(v) { _gFetch = v; },
              configurable: true,
              enumerable: true
            });
          } catch (e) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
